<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Contador de Refeições — Cantina</title>

<!-- PWA: instala como app, ícone e tela cheia -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#E8722E">
<meta name="background-color" content="#FBF7EE">
<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<!-- iOS: faz o app abrir em tela cheia, sem barra do Safari -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cantina">

<!-- Android/Chrome -->
<meta name="mobile-web-app-capable" content="yes">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Outfit:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #FBF7EE;
    --paper-deep: #F2EBDC;
    --ink: #2B2420;
    --ink-soft: #6B5F52;
    --carrot: #E8722E;
    --carrot-deep: #C85A1C;
    --stalk: #4F7942;
    --stalk-deep: #3C5E32;
    --mustard: #D9A62E;
    --line: #DDD2BC;
    --card: #FFFFFF;
    --shadow: 0 1px 0 rgba(43,36,32,0.04), 0 8px 24px -8px rgba(43,36,32,0.12);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0; padding:0;}
  body{
    background: var(--paper);
    background-image:
      radial-gradient(circle at 1px 1px, rgba(43,36,32,0.035) 1px, transparent 0);
    background-size: 22px 22px;
    color: var(--ink);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .wrap{
    max-width: 720px;
    margin: 0 auto;
    padding: 18px 18px 64px;
  }

  /* ---------- INSTALL BANNER ---------- */
  .install-banner{
    display:none;
    align-items:center;
    gap: 10px;
    background: var(--ink);
    color: var(--paper);
    border-radius: 14px;
    padding: 12px 12px 12px 16px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
  }
  .install-banner.show{ display:flex; }
  .install-text{
    flex:1;
    display:flex;
    flex-direction:column;
    line-height:1.3;
    min-width:0;
  }
  .install-text strong{
    font-size: 13.5px;
    font-weight:700;
  }
  .install-text span{
    font-size: 12px;
    color: #C9BFA9;
  }
  .install-btn{
    background: var(--carrot);
    color:white;
    border:none;
    font-weight:700;
    font-size: 13px;
    padding: 9px 14px;
    border-radius: 10px;
    cursor:pointer;
    flex-shrink:0;
  }
  .install-btn:active{ transform: scale(0.96); }
  .install-dismiss{
    background:none;
    border:none;
    color: #C9BFA9;
    font-size: 15px;
    cursor:pointer;
    padding: 4px 2px;
    flex-shrink:0;
  }

  /* ---------- HEADER ---------- */
  header{
    display:flex;
    align-items:center;
    justify-content: space-between;
    padding: 10px 4px 22px;
    border-bottom: 2px dashed var(--line);
    margin-bottom: 24px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .brand-mark{
    width:42px; height:42px;
    border-radius:11px;
    background: var(--carrot);
    display:flex; align-items:center; justify-content:center;
    box-shadow: var(--shadow);
    flex-shrink:0;
  }
  .brand-mark svg{ width:24px; height:24px; }
  .brand-text h1{
    font-family:'Archivo Black', sans-serif;
    font-size: 17px;
    letter-spacing: -0.01em;
    margin:0;
    line-height:1.1;
  }
  .brand-text p{
    margin:2px 0 0;
    font-size: 12.5px;
    color: var(--ink-soft);
    font-weight:500;
  }
  .date-pill{
    font-family:'Space Mono', monospace;
    font-size: 12px;
    background: var(--card);
    border:1px solid var(--line);
    border-radius: 999px;
    padding: 7px 12px;
    color: var(--ink-soft);
    white-space: nowrap;
  }

  /* ---------- TABS ---------- */
  .tabs{
    display:flex;
    gap: 6px;
    background: var(--paper-deep);
    border-radius: 14px;
    padding: 5px;
    margin-bottom: 22px;
    border: 1px solid var(--line);
  }
  .tab{
    flex:1;
    text-align:center;
    padding: 10px 6px;
    font-weight:700;
    font-size: 14px;
    border-radius: 10px;
    cursor:pointer;
    color: var(--ink-soft);
    transition: all .15s ease;
    user-select:none;
  }
  .tab.active{
    background: var(--card);
    color: var(--ink);
    box-shadow: var(--shadow);
  }

  .view{ display:none; }
  .view.active{ display:block; animation: fadeUp .35s ease; }
  @keyframes fadeUp{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  /* ---------- SCOREBOARD (signature element) ---------- */
  .scoreboard{
    background: var(--ink);
    border-radius: 22px;
    padding: 28px 20px 24px;
    text-align:center;
    position:relative;
    overflow:hidden;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .scoreboard::before{
    content:"";
    position:absolute; inset:0;
    background: repeating-linear-gradient(transparent 0 27px, rgba(255,255,255,0.025) 27px 28px);
    pointer-events:none;
  }
  .scoreboard .eyebrow{
    font-family:'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: #C9BFA9;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .score-digits{
    display:flex;
    justify-content:center;
    gap: 6px;
    margin: 4px 0 8px;
  }
  .digit{
    font-family:'Archivo Black', sans-serif;
    font-size: 64px;
    line-height:1;
    color: var(--paper);
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    width: 52px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 8px 0;
    transition: transform .25s cubic-bezier(.34,1.56,.64,1), color .25s;
  }
  .digit.flip{
    transform: translateY(-6px) scale(1.06);
    color: var(--mustard);
  }
  @media (max-width:420px){
    .digit{ font-size: 46px; width:38px; }
  }
  .scoreboard .caption{
    font-size: 13px;
    color: #C9BFA9;
    font-weight:500;
  }
  .scoreboard .caption b{ color: var(--mustard); }

  /* ---------- BIG BUTTON ---------- */
  .big-add{
    width:100%;
    border:none;
    background: var(--carrot);
    color: white;
    font-family:'Outfit', sans-serif;
    font-weight:800;
    font-size: 22px;
    padding: 26px 18px;
    border-radius: 20px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 12px;
    cursor:pointer;
    box-shadow: 0 4px 0 var(--carrot-deep), var(--shadow);
    transition: transform .08s ease, box-shadow .08s ease;
    margin-bottom: 14px;
    -webkit-user-select:none; user-select:none;
  }
  .big-add:active{
    transform: translateY(4px);
    box-shadow: 0 0 0 var(--carrot-deep);
  }
  .big-add svg{ width:26px; height:26px; flex-shrink:0; }

  .secondary-row{
    display:flex;
    gap: 10px;
    margin-bottom: 28px;
  }
  .ghost-btn{
    flex:1;
    border:1.5px solid var(--line);
    background: var(--card);
    color: var(--ink);
    font-weight:700;
    font-size: 14.5px;
    padding: 13px 10px;
    border-radius: 14px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:7px;
    transition: background .15s, transform .08s;
  }
  .ghost-btn:active{ transform: scale(0.97); }
  .ghost-btn.undo{ color: var(--carrot-deep); border-color: #F0CBAF; }
  .ghost-btn.undo:active{ background: #FCEEE3; }
  .ghost-btn svg{ width:16px; height:16px; }

  /* ---------- CLASS BREAKDOWN ---------- */
  .section-label{
    font-family:'Space Mono', monospace;
    font-size: 11.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 2px 10px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .section-label::after{
    content:"";
    flex:1;
    height:1px;
    background: var(--line);
  }

  /* ---------- REPORT VIEW ---------- */
  .report-hero{
    background: var(--card);
    border:1px solid var(--line);
    border-radius: 18px;
    padding: 22px;
    margin-bottom: 18px;
    box-shadow: var(--shadow);
  }
  .report-total{
    display:flex;
    align-items:baseline;
    gap: 10px;
    margin-bottom:4px;
  }
  .report-total .num{
    font-family:'Archivo Black', sans-serif;
    font-size: 46px;
    color: var(--carrot-deep);
  }
  .report-total .label{
    font-size: 14px;
    color: var(--ink-soft);
    font-weight:600;
  }
  .report-sub{
    font-size: 12.5px;
    color: var(--ink-soft);
    font-family:'Space Mono', monospace;
  }

  .history-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--paper-deep);
    font-size: 13.5px;
  }
  .history-item:last-child{ border-bottom:none; }
  .history-item .h-date{ font-weight:700; }
  .history-item .h-meta{ color: var(--ink-soft); font-family:'Space Mono', monospace; font-size:12px; }
  .history-item .h-total{
    font-family:'Archivo Black', sans-serif;
    font-size: 18px;
    color: var(--stalk-deep);
  }

  .empty-state{
    text-align:center;
    padding: 36px 20px;
    color: var(--ink-soft);
  }
  .empty-state svg{ width:48px; height:48px; opacity:0.5; margin-bottom:10px;}
  .empty-state p{ font-size: 13.5px; margin:0; }

  .reset-row{
    margin-top: 30px;
    text-align:center;
  }
  .reset-row button{
    background:none;
    border:none;
    color: #B23A3A;
    font-weight:700;
    font-size: 13px;
    cursor:pointer;
    padding: 8px 14px;
    border-radius: 10px;
    opacity:0.75;
  }
  .reset-row button:active{ background: #FBE7E7; opacity:1; }

  /* toast */
  .toast{
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--paper);
    padding: 12px 20px;
    border-radius: 999px;
    font-size: 13.5px;
    font-weight:600;
    box-shadow: var(--shadow);
    opacity:0;
    transition: opacity .25s, transform .25s;
    pointer-events:none;
    z-index: 50;
    white-space:nowrap;
  }
  .toast.show{
    opacity:1;
    transform: translateX(-50%) translateY(0);
  }

  :focus-visible{ outline: 2.5px solid var(--carrot-deep); outline-offset: 2px; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="install-banner" id="installBanner">
    <div class="install-text">
      <strong>Instale na tela de início</strong>
      <span id="installInstructions">para abrir como um app, em tela cheia</span>
    </div>
    <button id="btnInstall" class="install-btn">Instalar</button>
    <button id="btnDismissInstall" class="install-dismiss" aria-label="Fechar aviso">✕</button>
  </div>

  <header>
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 10h16M4 10c0-4 3-7 8-7s8 3 8 7M4 10v8a2 2 0 002 2h12a2 2 0 002-2v-8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 4v3M15 4v3" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <div class="brand-text">
        <h1>Contador da Cantina</h1>
        <p>Refeições do intervalo</p>
      </div>
    </div>
    <div class="date-pill" id="todayPill">—</div>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="contar">Contar</div>
    <div class="tab" data-tab="relatorio">Relatório do dia</div>
    <div class="tab" data-tab="historico">Histórico</div>
  </div>

  <!-- CONTAR -->
  <div class="view active" id="view-contar">
    <div class="scoreboard">
      <div class="eyebrow">Pratos servidos hoje</div>
      <div class="score-digits" id="scoreDigits"></div>
      <div class="caption">toque em <b>+1 prato</b> a cada refeição entregue</div>
    </div>

    <button class="big-add" id="btnAdd">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="white" stroke-width="3" stroke-linecap="round"/></svg>
      +1 prato
    </button>

    <div class="secondary-row">
      <button class="ghost-btn undo" id="btnUndo">
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 7v6h6M3 13a9 9 0 1 0 3-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Desfazer última
      </button>
    </div>

  </div>

  <!-- RELATORIO -->
  <div class="view" id="view-relatorio">
    <div class="report-hero">
      <div class="report-total">
        <div class="num" id="repTotal">0</div>
        <div class="label">pratos hoje</div>
      </div>
      <div class="report-sub" id="repSub">—</div>
    </div>

    <div class="reset-row">
      <button id="btnFinishDay">Encerrar o dia e salvar no histórico</button>
    </div>
  </div>

  <!-- HISTORICO -->
  <div class="view" id="view-historico">
    <div class="section-label">Dias anteriores</div>
    <div id="historyList" style="background:var(--card); border:1px solid var(--line); border-radius:16px; padding:6px 16px; box-shadow:var(--shadow);"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  var STORE_KEY = "cantina:state";
  var HISTORY_PREFIX = "cantina:day:";

  var state = {
    date: todayISO(),
    total: 0,
    log: [] // pilha de timestamps, usada só para permitir desfazer
  };

  function todayISO(){
    var d = new Date();
    return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
  }
  function pad(n){ return n<10 ? "0"+n : ""+n; }
  function formatDatePT(iso){
    var p = iso.split("-");
    var d = new Date(p[0], p[1]-1, p[2]);
    var dias = ["domingo","segunda-feira","terça-feira","quarta-feira","quinta-feira","sexta-feira","sábado"];
    var meses = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
    return dias[d.getDay()].charAt(0).toUpperCase()+dias[d.getDay()].slice(1)+", "+d.getDate()+" "+meses[d.getMonth()];
  }

  var storageReady = !!(window.storage && window.storage.get);

  async function loadState(){
    if(!storageReady){ renderAll(); return; }
    try{
      var res = await window.storage.get(STORE_KEY, false);
      if(res && res.value){
        var parsed = JSON.parse(res.value);
        if(parsed.date === todayISO()){
          state = parsed;
        } else {
          // novo dia: arquiva o anterior automaticamente se tinha movimento
          if(parsed.total > 0){
            await saveToHistory(parsed);
          }
          state.total = 0;
          state.log = [];
          state.date = todayISO();
          await persist();
        }
      }
    }catch(e){ /* sem dados salvos ainda */ }
    renderAll();
  }

  async function persist(){
    if(!storageReady) return;
    try{ await window.storage.set(STORE_KEY, JSON.stringify(state), false); }
    catch(e){ console.error("Erro ao salvar:", e); showToast("Não foi possível salvar agora"); }
  }

  async function saveToHistory(snapshot){
    try{
      await window.storage.set(HISTORY_PREFIX + snapshot.date, JSON.stringify(snapshot), false);
    }catch(e){ console.error("Erro ao arquivar dia:", e); }
  }

  // ---------- RENDER ----------
  function renderAll(){
    document.getElementById("todayPill").textContent = formatDatePT(state.date);
    renderScore();
    renderReport();
  }

  function renderScore(prevTotal){
    var box = document.getElementById("scoreDigits");
    var str = String(state.total).padStart(3, "0");
    var prevStr = prevTotal !== undefined ? String(prevTotal).padStart(3,"0") : null;
    box.innerHTML = "";
    for(var i=0;i<str.length;i++){
      var d = document.createElement("div");
      d.className = "digit";
      d.textContent = str[i];
      if(prevStr && prevStr[i] !== str[i]){ d.classList.add("flip"); }
      box.appendChild(d);
    }
    if(prevStr){
      setTimeout(function(){
        var digits = box.querySelectorAll(".digit");
        digits.forEach(function(d){ d.classList.remove("flip"); });
      }, 260);
    }
  }

  function renderReport(){
    document.getElementById("repTotal").textContent = state.total;
    var msg = state.total === 0
      ? "Nenhum prato registrado ainda hoje"
      : state.total === 1
        ? "1 prato registrado até agora"
        : state.total + " pratos registrados até agora";
    document.getElementById("repSub").textContent = formatDatePT(state.date) + " · " + msg;
  }

  async function renderHistory(){
    var box = document.getElementById("historyList");
    if(!storageReady){
      box.innerHTML = '<div class="empty-state"><p>Histórico indisponível neste navegador.</p></div>';
      return;
    }
    try{
      var list = await window.storage.list(HISTORY_PREFIX, false);
      if(!list || !list.keys || list.keys.length === 0){
        box.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 6h18M3 12h18M3 18h18"/></svg><p>Nenhum dia encerrado ainda.<br>Use "Encerrar o dia" no relatório para guardar o histórico.</p></div>';
        return;
      }
      var keys = list.keys.slice().sort().reverse();
      var rows = [];
      for(var i=0;i<keys.length;i++){
        try{
          var item = await window.storage.get(keys[i], false);
          if(item && item.value){ rows.push(JSON.parse(item.value)); }
        }catch(e){ /* ignora chave com erro */ }
      }
      if(rows.length === 0){
        box.innerHTML = '<div class="empty-state"><p>Nenhum dia encerrado ainda.</p></div>';
        return;
      }
      box.innerHTML = "";
      rows.forEach(function(day){
        var el = document.createElement("div");
        el.className = "history-item";
        el.innerHTML =
          '<div class="h-date">'+formatDatePT(day.date)+'</div>'+
          '<div class="h-total">'+day.total+'</div>';
        box.appendChild(el);
      });
    }catch(e){
      box.innerHTML = '<div class="empty-state"><p>Não foi possível carregar o histórico agora.</p></div>';
    }
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c];
    });
  }

  // ---------- ACTIONS ----------
  function addGeneral(){
    // soma ao total geral usando a primeira turma como destino padrão se nenhuma específica — mas aqui é botão geral
    var prevTotal = state.total;
    state.total += 1;
    state.log.push(""); // sem turma específica
    renderScore(prevTotal);
    renderReport();
    persist();
    showToast("+1 prato registrado");
  }

  function undoLast(){
    if(state.log.length === 0){ showToast("Nada para desfazer"); return; }
    state.log.pop();
    var prevTotal = state.total;
    state.total = Math.max(0, state.total - 1);
    renderScore(prevTotal);
    renderReport();
    persist();
    showToast("Última contagem desfeita");
  }

  async function finishDay(){
    if(state.total === 0){ showToast("Ainda não há pratos registrados hoje"); return; }
    var ok = window.confirm("Encerrar o dia de hoje ("+formatDatePT(state.date)+") com "+state.total+" prato(s) e salvar no histórico? A contagem do dia será zerada para o próximo intervalo.");
    if(!ok) return;
    await saveToHistory(state);
    state.total = 0;
    state.log = [];
    state.date = todayISO();
    await persist();
    renderAll();
    renderHistory();
    showToast("Dia salvo no histórico ✓");
    switchTab("historico");
  }

  var toastTimer;
  function showToast(msg){
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ t.classList.remove("show"); }, 2200);
  }

  // ---------- TABS ----------
  function switchTab(name){
    document.querySelectorAll(".tab").forEach(function(t){
      t.classList.toggle("active", t.dataset.tab === name);
    });
    document.querySelectorAll(".view").forEach(function(v){
      v.classList.remove("active");
    });
    document.getElementById("view-"+name).classList.add("active");
    if(name === "historico"){ renderHistory(); }
    if(name === "relatorio"){ renderReport(); }
  }

  // ---------- WIRE UP ----------
  document.querySelectorAll(".tab").forEach(function(t){
    t.addEventListener("click", function(){ switchTab(t.dataset.tab); });
  });
  document.getElementById("btnAdd").addEventListener("click", addGeneral);
  document.getElementById("btnUndo").addEventListener("click", undoLast);
  document.getElementById("btnFinishDay").addEventListener("click", finishDay);

  loadState();

  // ---------- PWA: registra o service worker (funciona offline) ----------
  if("serviceWorker" in navigator){
    window.addEventListener("load", function(){
      navigator.serviceWorker.register("service-worker.js").catch(function(err){
        console.error("Service worker não registrado:", err);
      });
    });
  }

  // ---------- PWA: banner de instalação ----------
  (function setupInstallBanner(){
    var DISMISS_KEY = "cantina:install-dismissed";
    var banner = document.getElementById("installBanner");
    var btnInstall = document.getElementById("btnInstall");
    var btnDismiss = document.getElementById("btnDismissInstall");
    var instructionsEl = document.getElementById("installInstructions");

    var ua = navigator.userAgent || "";
    var isIOS = /iPhone|iPad|iPod/.test(ua) && !window.MSStream;
    var isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;

    if(isStandalone) return; // já instalado, não mostra nada

    var dismissed = false;
    try{ dismissed = sessionStorage.getItem(DISMISS_KEY) === "1"; }catch(e){ /* sessionStorage pode estar bloqueado */ }
    if(dismissed) return;

    var deferredPrompt = null;

    if(isIOS){
      // iOS não tem prompt automático: mostra instrução manual.
      instructionsEl.textContent = 'toque em Compartilhar ⬆️ e depois em "Adicionar à Tela de Início"';
      btnInstall.style.display = "none";
      banner.classList.add("show");
    } else {
      // Android/Chrome: espera o navegador disparar o evento de instalação.
      window.addEventListener("beforeinstallprompt", function(e){
        e.preventDefault();
        deferredPrompt = e;
        banner.classList.add("show");
      });
      btnInstall.addEventListener("click", function(){
        if(!deferredPrompt) return;
        deferredPrompt.prompt();
        deferredPrompt.userChoice.finally(function(){
          deferredPrompt = null;
          banner.classList.remove("show");
        });
      });
    }

    btnDismiss.addEventListener("click", function(){
      banner.classList.remove("show");
      try{ sessionStorage.setItem(DISMISS_KEY, "1"); }catch(e){ /* ignora se bloqueado */ }
    });
  })();
})();
</script>
